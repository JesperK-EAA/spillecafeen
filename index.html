<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>spilcafeen</title>
  <link rel="stylesheet" href="css/style.css">
   <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />
</head>
<body>
   <body>
    <header>
      <figure>
        <img class="logo" src="imge/SC-logo-2023-transparant-BG+Small+Crop.webp" alt="Game Database Logo">
      <h1>Game Database</h1>
       </figure>
       
      <p class="subtitle">Søgning, genre og sortering</p>
    </header>

    <main>
      <section class="controls">
        <div class="control-group">
          <label for="search-input">Søg på titel</label>
          <input
            type="text"
            id="search-input"
            placeholder="Fx Matador, Uno eller Skak"
          />
        </div>

        <div class="control-group">
          <label for="genre-select">Genre</label>
          <select id="genre-select">
            <option value="all">Alle genrer</option>
          </select>
        </div>

        <div class="control-group">
          <label for="sort-select">Sortering</label>
          <select id="sort-select">
            <option value="none">Ingen sortering</option>
            <option value="title">Titel (A-Å)</option>
            <option value="age">Alder (ældste til yngste )</option>
            <option value="rating">Rating (højeste først)</option>
             <option value="playtime">Spilletid (længste først)</option>
          </select>
        </div>
      </section>

      <section class="status-bar">
        <p id="game-count">Viser 0 ud af 0 spil</p>
      </section>

      <section id="game-list" class="game-grid">
        <p class="loading">Loader spil...</p>
      </section>
    </main>

    <footer>
      <p>RACE - JavaScript Game App</p>
    </footer>

    <!-- Game Detail Dialog -->
    <dialog id="game-dialog">
      <form method="dialog">
        <button id="close-dialog" aria-label="Luk">✕</button>
        <div id="dialog-content">
          <!-- Spildetaljer indsættes her via JavaScript -->
        </div>
      </form>
    </dialog>


 <script src="js/script.js"></script>
</body>
</html>
